name: suq
description: "Suq - Mobile ERP for small shop owners."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.27.0" # Color.withValues and friends

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.4

  # Local DB (offline-first)
  drift: ^2.26.1
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.3

  # Localization & formatting
  intl: ^0.20.2

  # Exports
  printing: ^5.14.2
  excel: ^4.0.6
  pdf: ^3.11.3

  # UI
  google_fonts: ^8.1.0

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  decimal: ^3.2.1
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.3.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.1
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.3
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  generate: true   # enables l10n generation

  assets:
    - assets/images/
    - assets/icons/
